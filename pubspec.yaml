name: task_manager_app
description: Ứng dụng quản lý và nhắc nhở công việc cá nhân
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # State management
  provider: ^6.1.1

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.2
  permission_handler: ^11.1.0

  # Charts
  fl_chart: ^0.65.0

  # UI helpers
  flutter_slidable: ^3.0.1
  intl: ^0.20.2

  # Calendar & extras
  table_calendar: ^3.0.9
  uuid: ^4.2.1
  flutter_colorpicker: ^1.0.3

  # Quick Actions (long-press app icon)
  quick_actions: ^1.0.7

  # Shimmer loading effect
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
